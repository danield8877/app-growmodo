server {
    listen 80;
    listen [::]:80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Fichiers statiques (Vite hashed assets)
    location /assets/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # SPA React Router : toutes les routes → index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
